<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>المنتجات - Debug</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="static/style.css">
</head>
<body>

<nav class="navbar">
  <div class="container">
    <a class="navbar-brand" href="index.html">
      <img src="static/images/logo.png" alt="Logo">
      HmadProductsDeals
    </a>
  </div>
</nav>

<div class="container mt-5">
<h2 class="mb-4">🛒 كل المنتجات - Debug Mode</h2>

<!-- هذا البوكس بيطلع لك الخطأ -->
<div id="debugBox" class="alert alert-info small">1. بدأ التحميل...</div>

<div class="row mb-4 g-2">
    <div class="col-md-4"><input type="text" id="searchInput" class="form-control" placeholder="ابحث..."></div>
    <div class="col-md-3">
        <select id="categorySelect" class="form-select"><option value="">كل الفئات</option></select>
    </div>
    <div class="col-md-3">
        <select id="sortSelect" class="form-select">
            <option value="">افتراضي</option>
            <option value="price_asc">السعر: الأقل</option>
            <option value="price_desc">السعر: الأعلى</option>
        </select>
    </div>
    <div class="col-md-2"><button class="btn btn-primary w-100" onclick="applyFilters()">تطبيق</button></div>
</div>

<div class="row g-4" id="productsGrid"></div>
</div>

<script>
const SUPABASE_URL = 'https://dxuikjjfrkbzrzkomvne.supabase.co'
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImR4dWlrampmcmtienJ6a29tdm5lIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODExNzcyMzAsImV4cCI6MjA5Njc1MzIzMH0.WXhU1_qEqglpLBfJk-pLwxjbHGXleOsfLukNTqHERPc'

let allProducts = [];

const debug = (msg, type='info') => {
    const el = document.getElementById('debugBox')
    el.className = 'alert alert-' + type + ' small'
    el.innerHTML += '<br>→ ' + msg
}

async function loadProducts() {
    try {
        debug('2. جاري الاتصال بـ Supabase...')

        const url = `${SUPABASE_URL}/rest/v1/products?select=*&order=created_at.desc`

        const res = await fetch(url, {
            headers: {
                'apikey': SUPABASE_ANON_KEY,
                'Authorization': 'Bearer ' + SUPABASE_ANON_KEY
            }
        })

        debug('3. الرد وصل - Status: ' + res.status)

        if (!res.ok) {
            const errText = await res.text()
            debug('❌ فشل: ' + errText, 'danger')
            return
        }

        allProducts = await res.json()
        debug('✅ نجح! عدد المنتجات: ' + allProducts.length, 'success')

        if (allProducts.length === 0) {
            debug('⚠️ الجدول فاضي - أضف منتج من Supabase', 'warning')
            document.getElementById('productsGrid').innerHTML = '<p class="text-center">لا توجد منتجات</p>'
            return
        }

        // عرض اسم أول منتج للتأكد
        debug('4. أول منتج: ' + allProducts[0].name, 'success')

        // نعبي الفئات
        const categories = [...new Set(allProducts.map(p => p.category?.trim()).filter(Boolean))];
        debug('5. الفئات الموجودة: ' + categories.join(', '))
        const categorySelect = document.getElementById('categorySelect');
        categories.forEach(cat => {
            const option = document.createElement('option');
            option.value = cat;
            option.textContent = cat;
            categorySelect.appendChild(option);
        });

        applyFilters();

    } catch (e) {
        debug('❌ خطأ فادح: ' + e.message + ' - النوع: ' + e.name, 'danger')
        debug('الحل: طفي مانع الإعلانات أو جرب 4G', 'warning')
    }
}

function applyFilters() {
    let search = document.getElementById('searchInput').value.toLowerCase();
    let category = document.getElementById('categorySelect').value;
    let sort = document.getElementById('sortSelect').value;

    let filtered = allProducts.filter(p => {
        let matchSearch =!search || p.name.toLowerCase().includes(search)
        let matchCategory =!category || (p.category && p.category.trim() == category.trim())
        return matchSearch && matchCategory;
    });

    if(sort == 'price_asc') filtered.sort((a,b) => (a.sale_price || a.price) - (b.sale_price || b.price));
    if(sort == 'price_desc') filtered.sort((a,b) => (b.sale_price || b.price) - (a.sale_price || a.price));

    displayProducts(filtered);
}

function displayProducts(filtered) {
    const grid = document.getElementById('productsGrid');

    if(filtered.length == 0) {
        grid.innerHTML = '<p class="text-center text-muted">لا توجد منتجات</p>';
        return;
    }

    debug('6. جاري عرض ' + filtered.length + ' منتج', 'success')

    let html = '';
    filtered.forEach(p => {
        let imgs = p.images? p.images.split(',') : [];
        let img = imgs[0]?.trim() || 'static/images/logo.png';
        let price = p.sale_price || p.price;

        html += `
        <div class="col-6 col-md-3">
            <div class="card h-100">
                <img src="${img}" style="height:180px; object-fit:cover" onerror="this.src='static/images/logo.png'">
                <div class="card-body p-2">
                    <h6 style="font-size:14px">${p.name}</h6>
                    <p class="fw-bold mb-2">${price} ${p.currency || '$'}</p>
                    <a href="product_detail.html?id=${p.id}" class="btn btn-primary btn-sm w-100">تفاصيل</a>
                </div>
            </div>
        </div>`;
    });
    grid.innerHTML = html;
}

document.getElementById('searchInput').addEventListener('input', applyFilters);
document.getElementById('categorySelect').addEventListener('change', applyFilters);
document.getElementById('sortSelect').addEventListener('change', applyFilters);

loadProducts();
</script>
</body>
</html>
