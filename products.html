{% extends 'base.html' %}
{% block content %}

<h2 class="mb-4">🛒 جميع المنتجات</h2>

<!-- ===================== -->
<!-- البحث + الفلترة + الترتيب -->
<!-- ===================== -->
<div class="row mb-4 g-2">
    <!-- البحث -->
    <div class="col-md-4">
        <input type="text" id="searchInput" class="form-control" placeholder="ابحث عن منتج...">
    </div>

    <!-- الفئة -->
    <div class="col-md-3">
        <select id="categoryFilter" class="form-select">
            <option value="">كل الفئات</option>
        </select>
    </div>

    <!-- الترتيب -->
    <div class="col-md-3">
        <select id="sortSelect" class="form-select">
            <option value="">الترتيب الافتراضي</option>
            <option value="price_asc">السعر: من الأقل للأعلى</option>
            <option value="price_desc">السعر: من الأعلى للأقل</option>
            <option value="rating_desc">الأعلى تقييماً</option>
        </select>
    </div>

    <div class="col-md-2">
        <button class="btn btn-primary w-100" onclick="applyFilters()">تطبيق</button>
    </div>
</div>

<!-- ===================== -->
<!-- عرض المنتجات -->
<!-- ===================== -->
<div class="row g-4" id="products-grid">
    <p class="text-center">جاري تحميل المنتجات...</p>
</div>

<script>
let allProducts = [];

// 1. نجيب الفئة من الرابط لو جاي من index.html
const urlParams = new URLSearchParams(window.location.search);
const categoryFromURL = urlParams.get('category');

// 2. نقرأ JSON
fetch('products.json')
.then(res => res.json())
.then(products => {
    allProducts = products;
    loadCategories();
    applyFilters(); // نعرض المنتجات أول مرة
})
.catch(() => {
    document.getElementById('products-grid').innerHTML = '<p class="text-center text-danger">لا توجد منتجات</p>';
});

// 3. نعبي قائمة الفئات تلقائياً
function loadCategories() {
    const categories = [...new Set(allProducts.map(p => p.category).filter(Boolean))];
    const select = document.getElementById('categoryFilter');
    categories.forEach(cat => {
        select.innerHTML += `<option value="${cat}">${cat}</option>`;
    });
    if(categoryFromURL) select.value = categoryFromURL;
}

// 4. دالة البحث + الفلترة + الترتيب
function applyFilters() {
    let filtered = [...allProducts];

    // البحث
    const search = document.getElementById('searchInput').value.toLowerCase();
    if(search) {
        filtered = filtered.filter(p =>
            p.name.toLowerCase().includes(search) ||
            p.description.toLowerCase().includes(search)
        );
    }

    // الفئة
    const category = document.getElementById('categoryFilter').value;
    if(category) {
        filtered = filtered.filter(p => p.category == category);
    }

    // الترتيب
    const sort = document.getElementById('sortSelect').value;
    if(sort == 'price_asc') {
        filtered.sort((a,b) => (a.sale_price || a.price) - (b.sale_price || b.price));
    }
    if(sort == 'price_desc') {
        filtered.sort((a,b) => (b.sale_price || b.price) - (a.sale_price || a.price));
    }
    if(sort == 'rating_desc') {
        filtered.sort((a,b) => (b.rating || 0) - (a.rating || 0));
    }

    displayProducts(filtered);
}

// 5. عرض المنتجات
function displayProducts(products) {
    if(products.length == 0) {
        document.getElementById('products-grid').innerHTML = '<p class="text-center">لا توجد نتائج</p>';
        return;
    }

    let html = '';
    products.forEach(p => {
        const img = p.image? p.image.split(',')[0] : '/static/images/logo.png';
        const price = p.sale_price || p.price;
        const hasDiscount = p.sale_price && p.sale_price < p.price;
        const discount = hasDiscount? Math.round((p.price - p.sale_price) / p.price * 100) : 0;

        const rating = p.rating || 0;
        const fullStars = Math.floor(rating);
        const halfStar = (rating - fullStars) >= 0.5? 1 : 0;
        const emptyStars = 5 - fullStars - halfStar;
        let stars = '';
        for(let i=0; i<fullStars; i++) stars += '<span class="text-warning">&#9733;</span>';
        if(halfStar) stars += '<span class="text-warning">&#9733;</span>';
        for(let i=0; i<emptyStars; i++) stars += '<span class="text-secondary">&#9733;</span>';

        html += `
        <div class="col-md-3">
            <div class="card h-100 shadow-sm">
                <img src="${img}" class="img-fluid" style="max-height: 250px; object-fit: cover;">
                <div class="card-body d-flex flex-column">
                    <h5 class="card-title">${p.name}</h5>
                    <p class="card-text mb-1">
                        <span class="fw-bold">${p.currency || '$'}${price}</span>
                        ${hasDiscount? `<small class="text-muted text-decoration-line-through">${p.currency || '$'}${p.price}</small>` : ''}
                    </p>
                    ${hasDiscount? `<span class="badge bg-danger mb-2">${discount}% خصم</span>` : ''}
                    <div class="mb-2">
                        ${stars} <small>(${rating})</small>
                    </div>
                    <a href="product_detail.html?id=${p.id}" class="btn btn-primary mt-auto">عرض التفاصيل</a>
                </div>
            </div>
        </div>`;
    });
    document.getElementById('products-grid').innerHTML = html;
}

// البحث الفوري بدون ضغط زر
document.getElementById('searchInput').addEventListener('keyup', applyFilters);
document.getElementById('categoryFilter').addEventListener('change', applyFilters);
document.getElementById('sortSelect').addEventListener('change', applyFilters);
</script>

{% endblock %}
