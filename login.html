<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تسجيل الدخول - HmadProductsDeals</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Tajawal', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
        }
        .login-box {
            background: white;
            padding: 50px 40px;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            width: 100%;
            max-width: 420px;
            text-align: center;
        }
        .logo {
            width: 60px;
            margin-bottom: 20px;
        }
        h2 {
            color: #6a11cb;
            margin-bottom: 10px;
        }
        p {
            color: #666;
            margin-bottom: 40px;
            font-size: 15px;
        }
        .btn-google {
            width: 100%;
            padding: 14px;
            background: white;
            color: #444;
            border: 2px solid #ddd;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            transition: 0.3s;
        }
        .btn-google:hover {
            border-color: #6a11cb;
            box-shadow: 0 5px 15px rgba(106,17,203,0.2);
        }
        .btn-google:active {
            transform: scale(0.98);
        }
        .alert {
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: none;
            background: #fee;
            color: #c33;
            border: 1px solid #fcc;
            text-align: right;
            font-size: 14px;
        }
        .back-link {
            margin-top: 25px;
            display: block;
            color: #6a11cb;
            text-decoration: none;
            font-size: 14px;
        }
        .back-link:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="login-box">
        <img src="static/images/logo.png" alt="Logo" class="logo">
        <h2>مرحباً بك</h2>
        <p>سجل دخولك بحساب جوجل عشان تحفظ مفضلتك وتتابع المنتجات</p>

        <div id="alert" class="alert"></div>

        <button id="google-btn" class="btn-google">
            <svg width="20" height="20" viewBox="0 0 48 48">
                <path fill="#4285F4" d="M43.6 20.5h-1.9V20H24v8h11.3c-1.6 4.3-5.7 7.5-11.3 7.5-6.6 0-12-5.4-12-12s5.4-12 12-12c2.6 0 5 0.9 6.9 2.4l5.7-5.7C34.1 5.4 29.3 4 24 4 12.9 4 4 12.9 4 24s8.9 20 20 20c10.5 0 20-7.6 20-20 0-1.3-0.1-2.7-0.4-4z"/>
                <path fill="#34A853" d="M6.3 14.3l6.6 4.8C14.5 16.1 18.9 14 24 14c2.6 0 5 0.9 6.9 2.4l5.7-5.7C34.1 5.4 29.3 4 24 4 16.7 4 10.5 8.1 6.3 14.3z"/>
                <path fill="#FBBC05" d="M24 44c5.1 0 9.7-1.9 13.3-5l-6.2-5.1c-1.7 1.2-4 1.9-7.1 1.9-5.4 0-10-3.6-11.6-8.5l-6.6 5.1C10.3 39.9 16.7 44 24 44z"/>
                <path fill="#EA4335" d="M43.6 20.5h-1.9V20H24v8h11.3c-0.8 2.2-2.2 4-4 5.4l6.2 5.1c3.7-3.4 5.8-8.4 5.8-14.5 0-1.3-0.1-2.7-0.4-4z"/>
            </svg>
            تسجيل الدخول بجوجل
        </button>

        <a href="index.html" class="back-link">العودة للرئيسية</a>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const SUPABASE_URL = 'https://dxuikjjfrkbzrzkomvne.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImR4dWlrampmcmtienJ6a29tdm5lIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODExNzcyMzAsImV4cCI6MjA5Njc1MzIzMH0.WXhU1_qEqglpLBfJk-pLwxjbHGXleOsfLukNTqHERPc';
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        function showAlert(msg) {
            const alert = document.getElementById('alert');
            alert.textContent = msg;
            alert.style.display = 'block';
            setTimeout(() => alert.style.display = 'none', 5000);
        }

        // دالة تسجيل الدخول بجوجل
        async function signInWithGoogle() {
            document.getElementById('google-btn').disabled = true;
            
            const { error } = await supabase.auth.signInWithOAuth({
                provider: 'google',
                options: {
                    redirectTo: window.location.origin + '/login.html'
                }
            });
            
            if (error) {
                showAlert('خطأ: ' + error.message);
                document.getElementById('google-btn').disabled = false;
                console.error(error);
            }
        }

        // ربط الزر بالدالة
        document.getElementById('google-btn').addEventListener('click', signInWithGoogle);

        // لو المستخدم مسجل دخول نرجعه للرئيسية مباشرة
        supabase.auth.getSession().then(({ data: { session } }) => {
            if (session) {
                window.location.href = 'index.html';
            }
        });

        // بعد الرجوع من جوجل، نتأكد من الجلسة
        supabase.auth.onAuthStateChange((event, session) => {
            if (event === 'SIGNED_IN' && session) {
                window.location.href = 'index.html';
            }
        });
    </script>
</body>
</html>
