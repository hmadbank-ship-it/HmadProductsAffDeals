<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Login - HmadProductsDeals</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .login-card {
      background: white;
      padding: 40px;
      border-radius: 20px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
      width: 100%;
      max-width: 400px;
    }
    .login-card h2 {
      text-align: center;
      margin-bottom: 30px;
      color: #333;
      font-weight: 700;
    }
    .form-control {
      border-radius: 10px;
      padding: 12px;
    }
    .btn-primary {
      width: 100%;
      border-radius: 10px;
      padding: 12px;
      font-weight: 600;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      border: none;
    }
    .btn-primary:hover {
      opacity: 0.9;
    }
    #msg {
      text-align: center;
      margin-top: 15px;
      font-weight: 500;
    }
  </style>
</head>
<body>
  <div class="login-card">
    <h2>Admin Login</h2>
    
    <form id="loginForm">
      <input type="text" name="username" placeholder="الإيميل" class="form-control mb-3" required>
      <input type="password" name="password" placeholder="كلمة المرور" class="form-control mb-3" required>
      <button type="submit" class="btn btn-primary">دخول</button>
    </form>

    <p id="msg"></p>
  </div>

  <!-- Supabase JS -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    // 1. لصّق مفاتيحك هنا
    const SUPABASE_URL = 'https://dxuikjjfrkbzrzkomvne.supabase.co'
    const SUPABASE_KEY = 'sb_publishable_tzs-nupKfVqiVVn02Bk6ZA_GyjVftKm'

    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY)

    // 2. كود تسجيل الدخول
    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault()
      const msg = document.getElementById('msg')
      const btn = e.target.querySelector('button')
      
      msg.textContent = 'جاري الدخول...'
      msg.style.color = '#666'
      btn.disabled = true

      const username = e.target.username.value
      const password = e.target.password.value

      // Supabase يستخدم email مو username
      const { data, error } = await supabase.auth.signInWithPassword({
        email: username,
        password: password
      })

      btn.disabled = false

      if (error) {
        msg.textContent = 'خطأ: ' + error.message
        msg.style.color = 'red'
      } else {
        msg.textContent = 'تم الدخول بنجاح ✓ جاري التحويل...'
        msg.style.color = 'green'
        
        // بعد 1.5 ثانية يحولك لصفحة الأدمن
        setTimeout(() => {
          window.location.href = 'dashboard.html'
        }, 1500)
      }
    })

    // لو المستخدم مسجل دخول من قبل، يحوله مباشرة
    supabase.auth.getSession().then(({ data: { session } }) => {
      if (session) {
        window.location.href = 'dashboard.html'
      }
    })
  </script>
</body>
</html>
