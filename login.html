<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تسجيل الدخول - تشخيص</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        body {font-family: 'Tajawal', sans-serif; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; display: flex; align-items: center; justify-content: center; margin: 0;}
        .login-box {background: white; padding: 40px; border-radius: 20px; box-shadow: 0 20px 60px rgba(0,0,0,0.3); width: 100%; max-width: 500px; text-align: center;}
        .btn-google {width: 100%; padding: 14px; background: #4285F4; color: white; border: none; border-radius: 10px; font-size: 16px; font-weight: 600; cursor: pointer;}
        .debug {background: #f5f5f5; padding: 15px; border-radius: 8px; margin-top: 20px; text-align: left; font-size: 12px; font-family: monospace; max-height: 200px; overflow-y: auto;}
        .alert {padding: 12px; border-radius: 8px; margin: 15px 0; background: #fee; color: #c33; display: none;}
    </style>
</head>
<body>
    <div class="login-box">
        <h2>تسجيل الدخول</h2>
        <div id="alert" class="alert"></div>
        <button id="google-btn" class="btn-google">تسجيل الدخول بجوجل</button>
        
        <div class="debug" id="debug">
            <b>معلومات التشخيص:</b><br>
            الرابط الحالي: <span id="current-url"></span><br>
            redirectTo: <span id="redirect-url"></span><br>
            <hr>
            <div id="log"></div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const SUPABASE_URL = 'https://dxuikjjfrkbzrzkomvne.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImR4dWlrampmcmtienJ6a29tdm5lIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODExNzcyMzAsImV4cCI6MjA5Njc1MzIzMH0.WXhU1_qEqglpLBfJk-pLwxjbHGXleOsfLukNTqHERPc';
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        function log(msg) {
            document.getElementById('log').innerHTML += msg + '<br>';
            console.log(msg);
        }

        function showAlert(msg) {
            const alert = document.getElementById('alert');
            alert.textContent = msg;
            alert.style.display = 'block';
        }

        document.getElementById('current-url').textContent = window.location.href;
        document.getElementById('redirect-url').textContent = window.location.origin + '/login.html';

        document.getElementById('google-btn').addEventListener('click', async function() {
            log('1. الزر انضغط ✅');
            this.disabled = true;
            this.textContent = 'جاري التحويل لجوجل...';
            
            log('2. بنحاول نسجل دخول...');
            
            const { data, error } = await supabase.auth.signInWithOAuth({
                provider: 'google',
                options: {
                    redirectTo: window.location.origin + '/login.html'
                }
            });
            
            if (error) {
                log('❌ خطأ: ' + error.message);
                showAlert('خطأ: ' + error.message);
                this.disabled = false;
                this.textContent = 'تسجيل الدخول بجوجل';
            } else {
                log('3. التحويل بدأ... لو ما تحولت معناها فيه مشكلة في Supabase');
            }
        });

        // نطبع أي خطأ من الرابط لو رجعنا من جوجل
        const urlParams = new URLSearchParams(window.location.search);
        if (urlParams.get('error_description')) {
            showAlert('خطأ من جوجل: ' + urlParams.get('error_description'));
            log('❌ خطأ من جوجل: ' + urlParams.get('error_description'));
        }
    </script>
</body>
</html>
