<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة التحكم - Admin</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Tajawal', sans-serif; background: #f5f7fa; margin: 0; padding: 20px; }
        .container { max-width: 1200px; margin: auto; }
        h1 { color: #6a11cb; }
        .stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin: 30px 0; }
        .stat-card { background: white; padding: 25px; border-radius: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); text-align: center; }
        .stat-number { font-size: 36px; font-weight: 700; color: #6a11cb; }
        .stat-label { color: #666; margin-top: 5px; }
        table { width: 100%; background: white; border-radius: 15px; overflow: hidden; box-shadow: 0 5px 15px rgba(0,0,0,0.1); border-collapse: collapse; margin-top: 20px; }
        th { background: linear-gradient(135deg, #6a11cb, #2575fc); color: white; padding: 15px; text-align: right; }
        td { padding: 12px 15px; border-bottom: 1px solid #eee; }
        tr:hover { background: #f8f9ff; }
        .loading { text-align: center; padding: 50px; color: #999; }
        .no-access { text-align: center; padding: 100px 20px; }
        .no-access h2 { color: #c33; }
    </style>
</head>
<body>
    <div class="container">
        <h1>لوحة التحكم</h1>
        <div id="content" class="loading">جارٍ التحقق من الصلاحيات...</div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const SUPABASE_URL = 'https://dxuikjjfrkbzrzkomvne.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImR4dWlrampmcmtienJ6a29tdm5lIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODExNzcyMzAsImV4cCI6MjA5Njc1MzIzMH0.WXhU1_qEqglpLBfJk-pLwxjbHGXleOsfLukNTqHERPc';
        const ADMIN_EMAIL = 'hmadbank@gmail.com'; // إيميلك
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        async function init() {
            const { data: { user } = await supabase.auth.getUser();
            
            // تحقق من الأدمن
            if (!user || user.email !== ADMIN_EMAIL) {
                document.getElementById('content').innerHTML = `
                    <div class="no-access">
                        <h2>ممنوع الوصول</h2>
                        <p>هذه الصفحة للأدمن فقط</p>
                        <a href="index.html" style="color:#6a11cb">العودة للرئيسية</a>
                    </div>
                `;
                return;
            }

            // لو أدمن نعرض البيانات
            loadData();
        }

        async function loadData() {
            const content = document.getElementById('content');
            
            // 1. جلب الإحصائيات
            const { data: events } = await supabase.from('events').select('type');
            const visitors = events?.filter(e => e.type === 'page_view').length || 0;
            const clicks = events?.filter(e => e.type === 'affiliate_click').length || 0;
            
            // 2. جلب المستخدمين
            const { data: users } = await supabase.auth.admin.listUsers();
            const userEmails = users?.users.map(u => u.email) || [];
            
            // 3. جلب المنتجات
            const { data: products } = await supabase.from('products').select('*').order('created_at', { ascending: false });

            content.innerHTML = `
                <div class="stats">
                    <div class="stat-card">
                        <div class="stat-number">${visitors}</div>
                        <div class="stat-label">إجمالي الزيارات</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-number">${clicks}</div>
                        <div class="stat-label">إجمالي الضغطات</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-number">${userEmails.length}</div>
                        <div class="stat-label">عدد المستخدمين</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-number">${products?.length || 0}</div>
                        <div class="stat-label">عدد المنتجات</div>
                    </div>
                </div>

                <h2>المستخدمين المسجلين</h2>
                <table>
                    <tr><th>#</th><th>الإيميل</th><th>تاريخ التسجيل</th></tr>
                    ${userEmails.map((email, i) => `<tr><td>${i+1}</td><td>${email}</td><td>-</td></tr>`).join('')}
                </table>

                <h2 style="margin-top:40px">المنتجات</h2>
                <table>
                    <tr><th>الصورة</th><th>الاسم</th><th>السعر</th><th>الرابط</th></tr>
                    ${products?.map(p => `
                        <tr>
                            <td><img src="${p.image_url}" style="width:50px; height:50px; object-fit:cover; border-radius:8px"></td>
                            <td>${p.name}</td>
                            <td>${p.price} درهم</td>
                            <td><a href="${p.affiliate_url}" target="_blank">رابط الأفلييت</a></td>
                        </tr>
                    `).join('')}
                </table>
            `;
        }

        init();
    </script>
</body>
</html>
