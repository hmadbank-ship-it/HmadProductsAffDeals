<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>تفاصيل المنتج - HmadProductsDeals</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="static/style.css">
</head>

<body>


<!-- Navbar -->
<nav class="navbar">
  <div class="container">
    <a class="navbar-brand" href="index.html">
      <img src="static/images/logo.png" alt="Logo">
      HmadProductsDeals
    </a>
    <button class="navbar-toggle">☰</button>
    <div class="navbar-nav">
      <a class="btn-nav btn-nav-primary" href="index.html">الرئيسية</a>
      <a class="btn-nav btn-nav-secondary" href="products.html">المنتجات</a>
    </div>
  </div>
</nav>

<!-- product details -->
<div class="container mt-5" id="product-detail">
  <p class="text-center">
      جاري تحميل المنتج...
  </p>
</div>


<!-- Footer -->
<footer class="footer">
  <div class="container">
    <div class="row">
      <div class="col-md-4 footer-column">
        <div class="footer-logo">
          <img src="static/images/logo.png" alt="Logo">
          <span>HmadProductsDeals</span>
        </div>
        <p>أفضل العروض والمنتجات من AliExpress بأسعار لا تُقاوم.</p>
      </div>
      <div class="col-md-4 footer-column">
        <div class="footer-title">روابط سريعة</div>
        <ul class="list-unstyled">
          <li><a href="index.html">🏠 الرئيسية</a></li>
          <li><a href="products.html">🛒 المنتجات</a></li>
        </ul>
      </div>
      <div class="col-md-4 footer-column">
        <div class="footer-title">تواصل معنا</div>
        <p>📞 +212-722158341</p>
      </div>
    </div>
    <hr style="border-color: rgba(255,255,255,0.2);">
    <div class="text-center mt-3">© 2026 HmadProductsDeals</div>
  </div>
</footer>


<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<!-- حذفت مكتبة Supabase -->

<script>
const SUPABASE_URL = 'https://dxuikjjfrkbzrzkomvne.supabase.co'
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImR4dWlrampmcmtienJ6a29tdm5lIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODExNzcyMzAsImV4cCI6MjA5Njc1MzIzMH0.WXhU1_qEqglpLBfJk-pLwxjbHGXleOsfLukNTqHERPc'

const urlParams = new URLSearchParams(window.location.search);
const productId = urlParams.get('id');

async function loadProduct() {
    if(!productId) {
        document.getElementById('product-detail').innerHTML = '<p class="text-center text-danger">رابط المنتج غير صحيح</p>';
        return;
    }

    try {
        // نستخدم fetch مباشر زي index و products
        const url = `${SUPABASE_URL}/rest/v1/products?id=eq.${productId}&select=*`

        const res = await fetch(url, {
            headers: {
                'apikey': SUPABASE_ANON_KEY,
                'Authorization': 'Bearer ' + SUPABASE_ANON_KEY
            }
        })

        if (!res.ok) throw new Error('خطأ: ' + res.status)

        const data = await res.json()
        const product = data[0]

        if(!product) {
            document.getElementById('product-detail').innerHTML = '<p class="text-center text-danger">المنتج غير موجود</p>';
            return;
        }

        // الصور
        let imagesHTML = '';
        if(product.images && product.images.trim()!== '') {
            const imgs = product.images.split(',').map(i => i.trim()).filter(i => i);
            imagesHTML = `
            <div class="mb-3">
                <img src="${imgs[0]}" class="img-fluid rounded shadow-sm w-100" id="mainImage" style="height:400px;object-fit:cover" onerror="this.src='static/images/logo.png'">
            </div>
            <div class="d-flex flex-wrap gap-2">
                ${imgs.map(img =>
                    `<img src="${img}" class="img-thumbnail" style="width:80px;height:80px;object-fit:cover;cursor:pointer;" onclick="document.getElementById('mainImage').src=this.src" onerror="this.style.display='none'">`
                ).join('')}
            </div>`;
        }

        // الفيديو
        let videoHTML = '';
        if(product.video && product.video.trim()!== '') {
            let videoId = product.video;
            if(videoId.includes('youtube.com/watch?v=')) {
                videoId = videoId.split('v=')[1]?.split('&')[0];
            } else if(videoId.includes('youtu.be/')) {
                videoId = videoId.split('youtu.be/')[1]?.split('?')[0];
            }
            if(videoId) {
                videoHTML = `
                <div class="mt-3 ratio-16x9">
                    <iframe src="https://www.youtube.com/embed/${videoId}" frameborder="0" allowfullscreen class="rounded shadow-sm"></iframe>
                </div>`;
            }
        }

        // السعر والخصم
        const hasDiscount = product.sale_price && product.sale_price < product.price;
        const price = hasDiscount? product.sale_price : product.price;
        const discount = hasDiscount? Math.round((product.price - product.sale_price) / product.price * 100) : 0;
        const saved = hasDiscount? (product.price - product.sale_price).toFixed(2) : 0;

        // النجوم
        const rating = parseFloat(product.rating) || 0;
        const fullStars = Math.floor(rating);
        const halfStar = (rating - fullStars) >= 0.5? 1 : 0;
        const emptyStars = 5 - fullStars - halfStar;
        let starsHTML = '';
        for(let i=0; i<fullStars; i++) starsHTML += '<span class="text-warning fs-5">★</span>';
        if(halfStar) starsHTML += '<span class="text-warning fs-5">★</span>';
        for(let i=0; i<emptyStars; i++) starsHTML += '<span class="text-secondary fs-5">★</span>';

        document.getElementById('product-detail').innerHTML = `
        <div class="row g-4">
            <div class="col-md-6">
                ${imagesHTML}
                ${videoHTML}
            </div>
            <div class="col-md-6">
                <h2 class="fw-bold mb-3">${product.name}</h2>
                ${product.category? `<p class="text-muted mb-2">الفئة: <strong>${product.category}</strong></p>` : ''}

                <div class="mb-3">
                    ${hasDiscount? `
                    <p class="h3 text-danger mb-1">
                        ${product.currency || '$'}${price}
                        <small class="text-muted fs-5"><s>${product.currency || '$'}${product.price}</s></small>
                        <span class="badge bg-danger ms-2">${discount}% خصم</span>
                    </p>
                    <p class="text-success fw-bold">وفّر ${product.currency || '$'}${saved} (${discount}% خصم)</p>
                    ` : `<p class="h3">${product.currency || '$'}${price}</p>`}
                </div>

                ${rating > 0? `<div class="mb-3">${starsHTML} <small class="text-muted">(${rating})</small></div>` : ''}

                <p class="mb-4" style="white-space:pre-line">${product.description || ''}</p>

                <a href="${product.affiliate_link}" target="_blank" rel="nofollow" class="btn btn-lg btn-success fw-bold w-100 btn-modern">
                    🛒 تسوق الآن من AliExpress
                </a>
            </div>
        </div>`;
    } catch (e) {
        document.getElementById('product-detail').innerHTML = `
        <div class="alert alert-danger">
            <b>خطأ في التحميل:</b> ${e.message}<br>
            <small>طفي مانع الإعلانات وجرب مرة ثانية</small>
        </div>`
    }
}

loadProduct();

document.querySelector('.navbar-toggle')?.addEventListener('click', function() {
    document.querySelector('.navbar-nav')?.classList.toggle('active');
});
</script>
</body>
</html>
