<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>تفاصيل المنتج - Debug</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<div class="container mt-5">
  <div id="debugBox" class="alert alert-info mb-3" style="white-space:pre-line"></div>
  <div id="product-detail">
    <p class="text-center">جاري التحميل...</p>
  </div>
</div>

<script>
const SUPABASE_URL = 'https://dxuikjjfrkbzrzkomvne.supabase.co'
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImR4dWlrampmcmtienJ6a29tdm5lIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODExNzcyMzAsImV4cCI6MjA5Njc1MzIzMH0.WXhU1_qEqglpLBfJk-pLwxjbHGXleOsfLukNTqHERPc'

const debugBox = document.getElementById('debugBox');
function debug(msg) { debugBox.textContent += msg + '\n'; }

const urlParams = new URLSearchParams(window.location.search);
const productId = urlParams.get('id');

async function loadProduct() {
    debug('1. الـ ID من الرابط: ' + productId);

    if(!productId) {
        debug('❌ خطأ: ما فيه ID في الرابط');
        document.getElementById('product-detail').innerHTML = '<p class="text-danger">افتح المنتج من صفحة products.html</p>';
        return;
    }

    try {
        const url = `${SUPABASE_URL}/rest/v1/products?id=eq.${productId}&select=*`;
        debug('2. جاري الطلب: ' + url);

        const res = await fetch(url, {
            headers: {
                'apikey': SUPABASE_ANON_KEY,
                'Authorization': 'Bearer ' + SUPABASE_ANON_KEY
            }
        });

        debug('3. الرد وصل - Status: ' + res.status);

        if (!res.ok) {
            debug('❌ خطأ HTTP: ' + res.status);
            throw new Error('HTTP ' + res.status);
        }

        const data = await res.json();
        debug('4. البيانات: ' + JSON.stringify(data));

        const product = data[0];
        if(!product) {
            debug('❌ ما لقى منتج بالـ ID هذا');
            document.getElementById('product-detail').innerHTML = '<p class="text-danger">المنتج رقم ' + productId + ' غير موجود في قاعدة البيانات</p>';
            return;
        }

        debug('✅ لقينا المنتج: ' + product.name);
        debugBox.className = 'alert alert-success mb-3';

        // عرض بسيط عشان نتأكد
        document.getElementById('product-detail').innerHTML = `
        <h2>${product.name}</h2>
        <p>السعر: ${product.price} ${product.currency}</p>
        <p>الوصف: ${product.description}</p>
        <a href="${product.affiliate_link}" target="_blank" class="btn btn-success">تسوق الآن</a>
        `;

    } catch (e) {
        debug('❌ خطأ كامل: ' + e.message);
        document.getElementById('product-detail').innerHTML = '<p class="text-danger">خطأ: ' + e.message + '</p>'
    }
}

loadProduct();
</script>
</body>
</html>
