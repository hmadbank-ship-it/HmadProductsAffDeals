<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>تفاصيل المنتج - HmadProductsDeals</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="static/style.css">
    
</head>

<body>

<!-- Navbar -->
<nav class="navbar">
  <div class="container">
    <a class="navbar-brand" href="index.html">
      <img src="static/images/logo.png" alt="Logo">
      HmadProductsDeals
    </a>
    <button class="navbar-toggle">☰</button>
    <div class="navbar-nav">
      <a class="btn-nav btn-nav-primary" href="index.html">الرئيسية</a>
      <a class="btn-nav btn-nav-secondary" href="products.html">المنتجات</a>
    </div>
  </div>
</nav>

<!-- Content -->
<div class="container mt-5" id="product-detail">
  <p class="text-center">جاري تحميل المنتج...</p>
</div>

<!-- Footer -->
<footer class="footer">
  <div class="container">
    <div class="row">
      <div class="col-md-4 footer-column">
        <div class="footer-logo">
          <img src="static/images/logo.png" alt="Logo">
          <span>HmadProductsDeals</span>
        </div>
        <p>أفضل العروض والمنتجات من AliExpress بأسعار لا تُقاوم. نختار لك أفضل المنتجات بعناية لنوفر لك تجربة تسوق مميزة.</p>
      </div>
      <div class="col-md-4 footer-column">
        <div class="footer-title">روابط سريعة</div>
        <ul class="list-unstyled">
          <li><a href="index.html">🏠 الرئيسية</a></li>
          <li><a href="products.html">🛒 المنتجات</a></li>
        </ul>
      </div>
      <div class="col-md-4 footer-column">
        <div class="footer-title">تواصل معنا</div>
        <p>📞 +212-722158341</p>
      </div>
    </div>
    <hr style="border-color: rgba(255,255,255,0.2);">
    <div class="text-center mt-3">© 2026 HmadProductsDeals</div>
  </div>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
// 1. مفاتيح Supabase
const SUPABASE_URL = 'https://dxuikjjfrkbzrzkomvne.supabase.co'
const SUPABASE_KEY = 'sb_publishable_tzs-nupKfVqiVVn02Bk6ZA_GyjVftKm'
const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY)

// 2. نجيب الـ id من الرابط product_detail.html?id=2
const urlParams = new URLSearchParams(window.location.search);
const productId = parseInt(urlParams.get('id'));

async function loadProduct() {
    if(!productId) {
        document.getElementById('product-detail').innerHTML = '<p class="text-center text-danger">رابط المنتج غير صحيح</p>';
        return;
    }

    // 3. نجيب المنتج من Supabase
    const { data: product, error } = await supabase
      .from('products')
      .select('*')
      .eq('id', productId)
      .single();

    if(error || !product) {
        document.getElementById('product-detail').innerHTML = '<p class="text-center text-danger">المنتج غير موجود</p>';
        return;
    }

    // 4. نجهز الصور - نفصلها بفاصلة
    let imagesHTML = '';
    if(product.images) {
        const imgs = product.images.split(',');
        imagesHTML = `
        <div class="mb-3">
            <img src="${imgs[0]}" class="img-fluid rounded shadow-sm" id="mainImage">
        </div>
        <div class="d-flex flex-wrap">
            ${imgs.slice(1).map(img => 
                `<img src="${img}" class="img-thumbnail me-2 mb-2" style="width:80px; cursor:pointer;" onclick="document.querySelector('#mainImage').src=this.src;">`
            ).join('')}
        </div>`;
    }

    // 5. نجهز الفيديو - يوتيوب
    let videoHTML = '';
    if(product.video) {
        const videoId = product.video.split('v=')[1]?.split('&')[0] || product.video;
        videoHTML = `
        <div class="mt-3">
            <iframe width="100%" height="315" src="https://www.youtube.com/embed/${videoId}" 
            frameborder="0" allowfullscreen class="rounded shadow-sm"></iframe>
        </div>`;
    }

    // 6. نحسب السعر والخصم
    const hasDiscount = product.sale_price && product.sale_price < product.price;
    const price = hasDiscount? product.sale_price : product.price;
    const discount = hasDiscount? Math.round((product.price - product.sale_price) / product.price * 100) : 0;
    const saved = hasDiscount? (product.price - product.sale_price).toFixed(2) : 0;

    // 7. النجوم
    const rating = product.rating || 0;
    const fullStars = Math.floor(rating);
    const halfStar = (rating - fullStars) >= 0.5? 1 : 0;
    const emptyStars = 5 - fullStars - halfStar;
    let starsHTML = '';
    for(let i=0; i<fullStars; i++) starsHTML += '<span class="text-warning">&#9733;</span>';
    if(halfStar) starsHTML += '<span class="text-warning">&#9733;</span>';
    for(let i=0; i<emptyStars; i++) starsHTML += '<span class="text-secondary">&#9733;</span>';

    // 8. نعرض كل شي
    document.getElementById('product-detail').innerHTML = `
    <div class="row g-4">
        <!-- صور وفيديو -->
        <div class="col-md-6">
            ${imagesHTML}
            ${videoHTML}
        </div>

        <!-- تفاصيل -->
        <div class="col-md-6">
            <h2 class="fw-bold">${product.name}</h2>
            
            ${product.category? `<p class="text-muted mb-2">الفئة: <strong>${product.category}</strong></p>` : ''}
            
            <div class="mb-3">
                ${hasDiscount? `
                <p class="h4 text-danger">
                    ${product.currency || '$'}${price}
                    <small class="text-muted"><s>${product.currency || '$'}${product.price}</s></small>
                    <span class="badge bg-danger">${discount}% خصم</span>
                </p>
                <p class="text-success fw-bold">
                    وفّر ${product.currency || '$'}${saved} (${discount}% خصم)
                </p>
                ` : `<p class="h4">${product.currency || '$'}${price}</p>`}
            </div>

            <div class="mb-3">
                ${starsHTML} <small>(${rating})</small>
            </div>

            <p class="mb-4">${product.description || ''}</p>

            <a href="${product.affiliate_link}" target="_blank" class="btn btn-lg btn-success fw-bold w-100 btn-modern">
                🛒 تسوق الآن
            </a>
        </div>
    </div>`;
}

loadProduct();

// navbar toggle
document.querySelector('.navbar-toggle')?.addEventListener('click', function() {
    document.querySelector('.navbar-nav')?.classList.toggle('active');
});
</script>
</body>
</html>
